<!DOCTYPE html>
<html>



<head>
<link rel="stylesheet" href="styles/tes.css">

</head>

<body>
<div class="order-card">
    <div class="order-header">
        <span class="order-id">ID: #DK-20260315</span>
        <span class="order-status">Dikirim</span>
    </div>

    <div class="product-summary">
        <img src="img/anggur.jpg" class="product-img-main">
        <div class="summary-text">
            <h4>Anggur Merah Manis</h4>
            <p class="others-count">+2 produk lainnya</p>
        </div>
        <div class="summary-price">
            <p>Total Bayar</p>
            <strong>Rp45.000</strong>
        </div>
    </div>

    <div class="order-details" id="detail-1" style="display: none;">
        <hr>
        <div class="detail-item">
            <span>Bayam Organik (2 ikat)</span>
            <span>Rp10.000</span>
        </div>
        <div class="detail-item">
            <span>Wortel Lokal (1 kg)</span>
            <span>Rp15.000</span>
        </div>
        <div class="detail-item">
            <span>Biaya Pengiriman</span>
            <span>Rp5.000</span>
        </div>
        <hr>
        <div class="shipping-address">
            <p><strong>Alamat:</strong> Jl. Merdeka No. 10, Palembang (Budi Santoso)</p>
        </div>
    </div>

    <div class="order-actions">
        <button class="btn-toggle" onclick="toggleDetail('detail-1')">Lihat Detail Produk</button>
    </div>
</div>

</body>
<script>
  function toggleDetail(id) {
    var x = document.getElementById(id);
    var btn = event.target;
    
    if (x.style.display === "none") {
        x.style.display = "block";
        btn.innerText = "Tutup Detail";
    } else {
        x.style.display = "none";
        btn.innerText = "Lihat Detail Produk";
    }
}
</script>


</html>
