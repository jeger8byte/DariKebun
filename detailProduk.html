<!DOCTYPE html>
<html>
  <head>
    <title> Detail Produk </title>

    <link rel="stylesheet" href="styles/dariKebun/detailProduk.css">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


  </head>
  <body>



    <div class="dariKebun-header">
        <div class="header-left-section">
          
            <div class="toggle"><ion-icon name="reorder-three-outline"></ion-icon></div>
          

          <a href="" class="header-link">
            <img class="logo" src="">
          </a>
        </div>
      

        <div class="header-middle-section">
          
          <input class="search-bar" type="text" placeholder="Cari">
          
          <ion-icon for="search-bar" class="search-icon" name="search-outline"></ion-icon>
        
        </div>

        <div class="header-right-section">

          <a class="cart-link" href="keranjang.html">
            <ion-icon class="cart-icon" name="cart-outline"></ion-icon>
            <div class="cart-quantity">0</div>
          </a>

          
        </div>
        
    </div>

    <div class="sidebar-container">
      <div class="navigation">
        <ul>
          <li>
            <a href="wishlist.html">
              <span class="icon"><ion-icon name="heart-outline"></ion-icon></ion-icon></span>
              <span class="title">Wishlist</span>
            </a>
          </li>

          <li>
            <a href="buahan.html">    
              <span class="icon"><ion-icon name="logo-apple"></ion-icon></span>          
              <span class="title">Buah-buahan</span>
            </a>
          </li>

          <li>
            <a href="sayuran.html">
              <span class="icon"><ion-icon name="leaf-outline"></ion-icon></span>
              <span class="title">Sayur-sayuran</span>
            </a>
          </li>

          <li>
            <a href="perlengkapan.html">
              <span class="icon"><ion-icon name="sunny-outline"></ion-icon></span>
              <span class="title">Perlengkapan</span>
            </a>
          </li>

          <li>
            <a href="pesanan.html">
              <span class="icon"><ion-icon name="information-circle-outline"></ion-icon></ion-icon></span>
              <span class="title">Pesanan</span>
            </a>
          </li>
        </ul>
      </div>

    </div>

  <main class="buy-wrapper">
      
          <div class="buy-container">

            <div class="buy-box">
              <div class="image-wrapper">
                <img class="product-image" src="">
              </div>

              <div class="purchase-panel">
                <div class="row top-row">
                  <div class="product-stock">
                    Stok Total: <span>3</span>
                  </div>
                </div>
                <button class="add-to-cart-button">
                  +Keranjang
                </button>
              </div> 
            </div>


            <div class="buy-detail">

              <div class="product-header">
                <div class="product-name" >bayam ayam sinar
                </div>
                <button class="wishlist-button"> <i class="fa-solid fa-heart"></i></button>
              </div>

              <div class="product-price">Rp3333</div>

              <div class="product-description">
                <div class="judul">Detail Produk</div>
                <div class="isi">$333
                </div>
              </div>

            </div>
         </div>
    
  </main>

    <div id="customAlert" class="alert-box">
      <p>Tersimpan di Wishlist!</p>
      <button class="close_wish_notif">X</button>
    </div>
   
    <script type="module" src="script/pages/detailProduk.js"></script>
     <script type="module" src="script/sidebar/detailProduk-sidebar.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>



  </body>
</html>
