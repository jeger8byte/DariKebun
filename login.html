


<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="styles/darikebun/login.css">
  </head>
  <body>

    <div class="container" id="container">
      <div class="form-container sign-up">
        <form action="php/register.php" method="POST" >
            <h1>Create Account</h1>
            <div class="sosial-icons">
              <a href="#" class="icons"><i class="fa-brands fa-google-plus-g"></i></a> 
              <a href="#" class="icons"><i class="fa-brands fa-facebook"></i></a> 
              <a href="#" class="icons"><i class="fa-brands fa-x-twitter"></i></a> 
              <a href="#" class="icons"><i class="fa-brands fa-instagram"></i></a> 
            </div>
            <span>or use your email for registration</span>
            <input type="text" name="username" placeholder="Name">
            <input type="email" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign Up</button>

        </form>
      </div>
       <div class="form-container sign-in">
        <form action="" method="">
            <h1>Sign In</h1>
            <div class="social-icons">
              <a href="#" class="icons"><i class="fa-brands fa-google-plus-g"></i></a> 
              <a href="#" class="icons"><i class="fa-brands fa-facebook"></i></a> 
              <a href="#" class="icons"><i class="fa-brands fa-x-twitter"></i></a> 
              <a href="#" class="icons"><i class="fa-brands fa-instagram"></i></a> 
            </div>
            <span>or use your email password</span>
            <input type="email" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password">
           
            <button type="submit">Sign In</button>

        </form>
      </div>
      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1> Welcome Back</h1>
            <p>"Nice to See You Again!"</p>
            <button class="hidden" id="login">Sign In</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1> Hello</h1>
            <p>"Hello, New User!"</p>
            <button class="hidden" id="register">Sign Up</button>
          </div>
        </div>
      </div>
    </div>

  </body>

  <script type="module" src="script/pages/login.js"></script>
</html>
